<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ilon O'yini</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    overflow: hidden;
    font-family: 'Courier New', monospace;
    color: #fff;
    width: 100vw;
    height: 100vh;
  }
  canvas { display: block; }

  #overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.88);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 10;
    gap: 18px;
  }
  #overlay.hidden { display: none; }

  .overlay-title {
    font-size: clamp(28px, 6vw, 52px);
    font-weight: 900;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    border: 3px solid #fff;
    padding: 10px 28px;
    animation: blink-border 1.4s step-end infinite;
  }
  @keyframes blink-border {
    0%,100% { border-color: #fff; }
    50% { border-color: #333; }
  }

  .score-display {
    font-size: clamp(14px, 2.5vw, 22px);
    letter-spacing: 0.1em;
    color: #ccc;
  }
  .score-display span { color: #fff; font-weight: bold; font-size: 1.3em; }

  .btn-row { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }

  button {
    background: #000;
    color: #fff;
    border: 2px solid #fff;
    padding: 10px 28px;
    font-size: clamp(13px, 2vw, 18px);
    font-family: 'Courier New', monospace;
    letter-spacing: 0.1em;
    cursor: pointer;
    text-transform: uppercase;
    transition: background 0.15s, color 0.15s;
  }
  button:hover { background: #fff; color: #000; }

  #history-panel {
    max-height: 160px;
    overflow-y: auto;
    border: 1px solid #444;
    padding: 10px 18px;
    min-width: 220px;
    max-width: 340px;
    width: 80vw;
  }
  #history-panel h3 {
    font-size: 13px;
    letter-spacing: 0.15em;
    margin-bottom: 8px;
    color: #aaa;
    text-transform: uppercase;
  }
  .history-row {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    padding: 3px 0;
    border-bottom: 1px solid #222;
    color: #ddd;
  }
  .history-row:last-child { border-bottom: none; }
  .history-row .rank { color: #888; margin-right: 10px; }
  .history-row.top { color: #fff; font-weight: bold; }

  #hud {
    position: fixed;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 18px;
    z-index: 5;
    pointer-events: none;
    background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, transparent 100%);
  }
  #hud span {
    font-size: clamp(13px, 2vw, 18px);
    letter-spacing: 0.12em;
    text-shadow: 0 0 8px #000;
  }

  #pause-hint {
    position: fixed;
    bottom: 14px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    color: #444;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    pointer-events: none;
    z-index: 5;
  }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #000; }
  ::-webkit-scrollbar-thumb { background: #555; }
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="hud">
  <span id="score-hud">BALL: 0</span>
  <span id="best-hud">ENG YAXSHI: 0</span>
</div>

<div id="pause-hint">PROBEL — PAUZA</div>

<div id="overlay">
  <div class="overlay-title" id="overlay-title">ILON</div>
  <div class="score-display" id="overlay-score" style="display:none">
    NATIJA: <span id="final-score">0</span>
  </div>
  <div class="btn-row">
    <button id="btn-start">BOSHLASH</button>
    <button id="btn-history" onclick="toggleHistory()">TARIX</button>
  </div>
  <div id="history-panel" style="display:none">
    <h3>Natijalar tarixi</h3>
    <div id="history-list"></div>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H, CELL, COLS, ROWS;
let snake, dir, nextDir, food, score, best, gameLoop, state, history, particles;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  CELL = Math.floor(Math.min(W, H) / 30);
  COLS = Math.floor(W / CELL);
  ROWS = Math.floor(H / CELL);
}

function init() {
  resize();
  const mx = Math.floor(COLS / 2), my = Math.floor(ROWS / 2);
  snake = [{x: mx, y: my}, {x: mx-1, y: my}, {x: mx-2, y: my}];
  dir = {x: 1, y: 0};
  nextDir = {x: 1, y: 0};
  score = 0;
  particles = [];
  spawnFood();
  updateHUD();
}

function spawnFood() {
  let pos;
  do {
    pos = {x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS)};
  } while (snake.some(s => s.x === pos.x && s.y === pos.y));
  food = pos;
}

function step() {
  dir = {...nextDir};
  const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

  // Wall collision
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) { return endGame(); }
  // Self collision
  if (snake.some(s => s.x === head.x && s.y === head.y)) { return endGame(); }

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score++;
    updateHUD();
    spawnParticles(food.x * CELL + CELL/2, food.y * CELL + CELL/2);
    spawnFood();
  } else {
    snake.pop();
  }
}

// Particles
function spawnParticles(px, py) {
  for (let i = 0; i < 14; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1.5 + Math.random() * 3;
    particles.push({
      x: px, y: py,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1.0,
      size: 2 + Math.random() * 3
    });
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.12;
    p.life -= 0.045;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// Draw
function draw() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  // Grid (subtle)
  ctx.strokeStyle = '#0d0d0d';
  ctx.lineWidth = 0.5;
  for (let x = 0; x <= COLS; x++) {
    ctx.beginPath(); ctx.moveTo(x*CELL, 0); ctx.lineTo(x*CELL, H); ctx.stroke();
  }
  for (let y = 0; y <= ROWS; y++) {
    ctx.beginPath(); ctx.moveTo(0, y*CELL); ctx.lineTo(W, y*CELL); ctx.stroke();
  }

  // Food — pulsing circle
  const pulse = 0.8 + 0.2 * Math.sin(Date.now() / 180);
  const fr = CELL * 0.38 * pulse;
  const fx = food.x * CELL + CELL / 2;
  const fy = food.y * CELL + CELL / 2;
  ctx.save();
  ctx.shadowColor = '#fff';
  ctx.shadowBlur = 12 * pulse;
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(fx, fy, fr, 0, Math.PI * 2);
  ctx.fill();
  // Inner dot
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.arc(fx, fy, fr * 0.42, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // Snake
  const len = snake.length;
  for (let i = len - 1; i >= 0; i--) {
    const seg = snake[i];
    const t = 1 - i / len;
    const r = CELL * (0.44 + 0.06 * t);
    const cx2 = seg.x * CELL + CELL / 2;
    const cy2 = seg.y * CELL + CELL / 2;
    const brightness = Math.round(140 + 115 * t);
    const col = `rgb(${brightness},${brightness},${brightness})`;

    ctx.save();
    ctx.shadowColor = i === 0 ? '#fff' : 'transparent';
    ctx.shadowBlur = i === 0 ? 14 : 0;
    ctx.fillStyle = col;

    // Body segments with rounded rect
    const pad = CELL * (0.08 + 0.05 * (1 - t));
    roundRect(ctx, seg.x * CELL + pad, seg.y * CELL + pad, CELL - pad*2, CELL - pad*2, r * 0.7);
    ctx.fill();
    ctx.restore();

    // Head details
    if (i === 0) {
      drawHead(seg, dir, r);
    }
  }

  // Segment joints — connecting lines for smooth look
  ctx.lineWidth = CELL * 0.55;
  ctx.lineCap = 'round';
  for (let i = 0; i < len - 1; i++) {
    const a = snake[i], b = snake[i+1];
    const t = 1 - i / len;
    const brightness = Math.round(140 + 115 * t);
    ctx.strokeStyle = `rgb(${brightness},${brightness},${brightness})`;
    ctx.globalAlpha = 0.45;
    ctx.beginPath();
    ctx.moveTo(a.x * CELL + CELL/2, a.y * CELL + CELL/2);
    ctx.lineTo(b.x * CELL + CELL/2, b.y * CELL + CELL/2);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;

  drawParticles();
}

function drawHead(seg, d, r) {
  const cx2 = seg.x * CELL + CELL / 2;
  const cy2 = seg.y * CELL + CELL / 2;

  // Eyes
  const eyeOffset = CELL * 0.22;
  const eyeR = CELL * 0.09;
  let e1, e2;
  if (d.x !== 0) {
    e1 = {x: cx2 + d.x * CELL * 0.15, y: cy2 - eyeOffset};
    e2 = {x: cx2 + d.x * CELL * 0.15, y: cy2 + eyeOffset};
  } else {
    e1 = {x: cx2 - eyeOffset, y: cy2 + d.y * CELL * 0.15};
    e2 = {x: cx2 + eyeOffset, y: cy2 + d.y * CELL * 0.15};
  }
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(e1.x, e1.y, eyeR, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(e2.x, e2.y, eyeR, 0, Math.PI*2); ctx.fill();
  // Eye shine
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(e1.x + eyeR*0.3, e1.y - eyeR*0.3, eyeR*0.35, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(e2.x + eyeR*0.3, e2.y - eyeR*0.3, eyeR*0.35, 0, Math.PI*2); ctx.fill();

  // Tongue
  const tongueLen = CELL * 0.42;
  const tx = cx2 + d.x * CELL * 0.5;
  const ty = cy2 + d.y * CELL * 0.5;
  const wobble = Math.sin(Date.now() / 80) * CELL * 0.13;
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(cx2 + d.x * CELL * 0.38, cy2 + d.y * CELL * 0.38);
  ctx.lineTo(tx, ty);
  ctx.stroke();
  // Fork
  const perp = {x: -d.y, y: d.x};
  ctx.beginPath();
  ctx.moveTo(tx, ty);
  ctx.lineTo(tx + d.x * tongueLen * 0.5 + perp.x * (CELL*0.12 + wobble),
             ty + d.y * tongueLen * 0.5 + perp.y * (CELL*0.12 + wobble));
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(tx, ty);
  ctx.lineTo(tx + d.x * tongueLen * 0.5 - perp.x * (CELL*0.12 + wobble),
             ty + d.y * tongueLen * 0.5 - perp.y * (CELL*0.12 + wobble));
  ctx.stroke();
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

let lastTime = 0;
const BASE_SPEED = 140;
function getSpeed() {
  return Math.max(60, BASE_SPEED - score * 3);
}

function gameFrame(ts) {
  if (state !== 'playing') return;
  updateParticles();
  draw();
  if (ts - lastTime >= getSpeed()) {
    step();
    lastTime = ts;
  }
  gameLoop = requestAnimationFrame(gameFrame);
}

function startGame() {
  hideOverlay();
  state = 'playing';
  init();
  lastTime = 0;
  gameLoop = requestAnimationFrame(gameFrame);
}

function endGame() {
  state = 'over';
  cancelAnimationFrame(gameLoop);
  if (score > (best || 0)) best = score;
  saveHistory(score);
  updateHUD();
  document.getElementById('overlay-title').textContent = 'O\'YIN TUGADI';
  document.getElementById('overlay-score').style.display = 'block';
  document.getElementById('final-score').textContent = score;
  document.getElementById('btn-start').textContent = 'QAYTA BOSHLASH';
  renderHistory();
  showOverlay();
}

function pauseGame() {
  if (state === 'playing') {
    state = 'paused';
    cancelAnimationFrame(gameLoop);
    document.getElementById('overlay-title').textContent = 'PAUZA';
    document.getElementById('overlay-score').style.display = 'none';
    document.getElementById('btn-start').textContent = 'DAVOM ETISH';
    renderHistory();
    showOverlay();
  } else if (state === 'paused') {
    state = 'playing';
    hideOverlay();
    lastTime = 0;
    gameLoop = requestAnimationFrame(gameFrame);
  }
}

function showOverlay() { document.getElementById('overlay').classList.remove('hidden'); }
function hideOverlay() { document.getElementById('overlay').classList.add('hidden'); }

function updateHUD() {
  document.getElementById('score-hud').textContent = `BALL: ${score}`;
  document.getElementById('best-hud').textContent = `ENG YAXSHI: ${best || 0}`;
}

// History
function saveHistory(s) {
  if (!history) history = [];
  const now = new Date();
  history.push({
    score: s,
    time: now.toLocaleTimeString('uz', {hour:'2-digit', minute:'2-digit'})
  });
  history.sort((a, b) => b.score - a.score);
  if (history.length > 20) history = history.slice(0, 20);
}

function renderHistory() {
  const list = document.getElementById('history-list');
  if (!history || history.length === 0) {
    list.innerHTML = '<div style="color:#555;font-size:12px;text-align:center;padding:8px">Hali natija yo\'q</div>';
    return;
  }
  list.innerHTML = history.map((h, i) =>
    `<div class="history-row ${i===0?'top':''}">
      <span><span class="rank">#${i+1}</span>${h.score} ball</span>
      <span style="color:#666">${h.time}</span>
    </div>`
  ).join('');
}

function toggleHistory() {
  const panel = document.getElementById('history-panel');
  const isHidden = panel.style.display === 'none';
  panel.style.display = isHidden ? 'block' : 'none';
  if (isHidden) renderHistory();
}

// Controls
document.addEventListener('keydown', e => {
  const map = {
    ArrowUp: {x:0,y:-1}, ArrowDown: {x:0,y:1},
    ArrowLeft: {x:-1,y:0}, ArrowRight: {x:1,y:0},
    w: {x:0,y:-1}, s: {x:0,y:1}, a: {x:-1,y:0}, d: {x:1,y:0}
  };
  if (e.code === 'Space') { e.preventDefault(); if (state === 'playing' || state === 'paused') pauseGame(); return; }
  if (map[e.key] && state === 'playing') {
    const nd = map[e.key];
    if (nd.x !== -dir.x || nd.y !== -dir.y) nextDir = nd;
  }
});

// Touch / swipe
let touchStart = null;
document.addEventListener('touchstart', e => {
  touchStart = {x: e.touches[0].clientX, y: e.touches[0].clientY};
}, {passive: true});
document.addEventListener('touchend', e => {
  if (!touchStart || state !== 'playing') return;
  const dx = e.changedTouches[0].clientX - touchStart.x;
  const dy = e.changedTouches[0].clientY - touchStart.y;
  if (Math.abs(dx) < 10 && Math.abs(dy) < 10) return;
  if (Math.abs(dx) > Math.abs(dy)) {
    const nd = dx > 0 ? {x:1,y:0} : {x:-1,y:0};
    if (nd.x !== -dir.x) nextDir = nd;
  } else {
    const nd = dy > 0 ? {x:0,y:1} : {x:0,y:-1};
    if (nd.y !== -dir.y) nextDir = nd;
  }
  touchStart = null;
}, {passive: true});

window.addEventListener('resize', () => {
  resize();
  if (state === 'playing' || state === 'paused') draw();
});

document.getElementById('btn-start').addEventListener('click', startGame);

// Init
best = 0;
history = [];
state = 'idle';
resize();
// Draw empty screen
ctx.fillStyle = '#000';
ctx.fillRect(0, 0, W, H);
</script>
</body>
</html>
